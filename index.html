<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>喝水养花</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{cream:'#FDFBF7',ink:'#1a1a1a',soft:'#7a7a7a',faint:'#d4d0c8',warm:{50:'#faf8f5',100:'#f5f0e8',200:'#ebe3d5',300:'#d9ceba',400:'#c4b69f',500:'#a89878'}}}}}</script>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",-apple-system,sans-serif;background:#FDFBF7;color:#1a1a1a;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.glass{background:rgba(255,255,255,0.55);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(0,0,0,0.05)}
.plant-trans *{transition:fill 0.9s cubic-bezier(0.4,0,0.2,1),stroke 0.9s cubic-bezier(0.4,0,0.2,1),opacity 0.6s ease,transform 0.7s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes bloom-bounce{0%,100%{transform:scale(1)}30%{transform:scale(1.06)}60%{transform:scale(0.97)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes shimmer{0%,100%{opacity:0.3}50%{opacity:0.7}}
.anim-bloom{animation:bloom-bounce 0.8s cubic-bezier(0.34,1.56,0.64,1)}
.anim-float{animation:float 4s ease-in-out infinite}
.anim-shimmer{animation:shimmer 2.5s ease-in-out infinite}
.ambient-glow{position:fixed;inset:0;z-index:0;filter:blur(100px);opacity:0.28;transition:background 1.2s ease-in-out;pointer-events:none}
@keyframes sparkle-burst{0%{transform:translate(0,0) scale(0);opacity:1}15%{transform:translate(0,0) scale(1.5);opacity:1}100%{transform:translate(var(--sx),var(--sy)) scale(0.15);opacity:0}}
@keyframes flower-bounce{0%{transform:scale(1)}25%{transform:scale(1.06)}55%{transform:scale(0.97)}100%{transform:scale(1)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

function todayKey(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function timeNow(){const d=new Date();return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate()}
function dateKey(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function hashStr(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h+s.charCodeAt(i))|0;return Math.abs(h)}
function textToHue(t){return hashStr(t)%360}
const OL='#2d2a26';
function hueHSL(h){return `hsl(${h},56%,68%)`}
function hueSoft(h){return `hsl(${h},38%,84%)`}
function hueAccent(h){return `hsl(${h},48%,55%)`}
function easeOut(t){return 1-Math.pow(1-Math.min(t,1),3)}

const PLANTS=[
  {id:'rose',name:'玫瑰',emoji:'🌹',stem:'#8a9a78'},
  {id:'tulip',name:'郁金香',emoji:'🌷',stem:'#7a9a68'},
  {id:'daisy',name:'雏菊',emoji:'🌼',stem:'#8a9a70'},
  {id:'lily',name:'百合',emoji:'🪻',stem:'#6a8a68'},
  {id:'lotus',name:'莲花',emoji:'🪷',stem:'#7a8a70'},
  {id:'orchid',name:'兰花',emoji:'🌸',stem:'#7a9278'},
  {id:'poppy',name:'虞美人',emoji:'💮',stem:'#8a9a68'},
  {id:'peony',name:'牡丹',emoji:'🏵️',stem:'#789068'},
];
function pickPlant(dk){let h=0;for(let c of dk)h=((h<<5)-h+c.charCodeAt(0))|0;return PLANTS[Math.abs(h)%PLANTS.length].id}

function BloomFlower({tid,cx,fy,s,sc,main,light,hue}){
  if(sc<0.3)return null;
  function rpet(dx,dy){return`M${cx},${fy} C${cx-dx},${fy-dy*0.35} ${cx-dx},${fy-dy*0.8} ${cx},${fy-dy} C${cx+dx},${fy-dy*0.8} ${cx+dx},${fy-dy*0.35} ${cx},${fy} Z`}
  function ppet(dx,dy){return`M${cx},${fy} C${cx-dx*0.6},${fy-dy*0.3} ${cx-dx*0.8},${fy-dy*0.75} ${cx},${fy-dy} C${cx+dx*0.8},${fy-dy*0.75} ${cx+dx*0.6},${fy-dy*0.3} ${cx},${fy} Z`}
  const ac=hueAccent(hue),els=[];
  switch(tid){
    case 'rose':{
      const layers=[{n:5,r:s*0.55*sc,rot:0,p:'rpet',w:s*0.65*sc,h:s*0.9*sc},{n:5,r:s*0.38*sc,rot:18,p:'rpet',w:s*0.48*sc,h:s*0.65*sc},{n:5,r:s*0.22*sc,rot:36,p:'ppet',w:s*0.3*sc,h:s*0.4*sc}];
      layers.forEach(({n,r,rot,p,w,h},li)=>{const fill=li%2?main:light;for(let i=0;i<n;i++){const a=(i/n)*360+rot;els.push(<path key={`${li}-${i}`} d={ppet(w,h)} fill={fill} stroke={OL} strokeWidth="1" transform={`rotate(${a} ${cx} ${fy})`}/>)}});
      for(let i=0;i<5;i++){const a=(i/5)*360;els.push(<circle key={`sc-${i}`} cx={cx+Math.cos(a*Math.PI/180)*s*0.08*sc} cy={fy-s*0.05*sc} r={s*0.06*sc} fill="#f5e8a0" stroke={OL} strokeWidth="0.6"/>)}
      break;}
    case 'tulip':
      els.push(<path key="c" d={`M${cx},${fy-2} Q${cx-22},${fy-s*1.15} ${cx},${fy-s*1.4} Q${cx+22},${fy-s*1.15} ${cx},${fy-2}`} fill={light} stroke={OL} strokeWidth="1.1"/>);
      els.push(<path key="l" d={`M${cx},${fy} Q${cx-28},${fy-s*0.55} ${cx-16},${fy-s*1.2} Q${cx-8},${fy-s*0.45} ${cx},${fy-5}`} fill={main} stroke={OL} strokeWidth="1.2"/>);
      els.push(<path key="r" d={`M${cx},${fy} Q${cx+28},${fy-s*0.55} ${cx+16},${fy-s*1.2} Q${cx+8},${fy-s*0.45} ${cx},${fy-5}`} fill={main} stroke={OL} strokeWidth="1.2"/>);
      break;
    case 'daisy':
      for(let i=0;i<16;i++){const a=(i/16)*360;els.push(<path key={i} d={ppet(s*0.22*sc,s*0.68*sc)} fill={i%3?main:light} stroke={OL} strokeWidth="0.8" transform={`rotate(${a} ${cx} ${fy})`}/>)}
      els.push(<circle key="c" cx={cx} cy={fy} r={s*0.28*sc} fill="#f5e8a0" stroke={OL} strokeWidth="1"/>);
      for(let i=0;i<12;i++){const a=(i/12)*360,r2=s*0.18*sc;els.push(<circle key={`sd-${i}`} cx={cx+Math.cos(a*Math.PI/180)*r2} cy={fy+Math.sin(a*Math.PI/180)*r2} r="1.2" fill={OL} opacity="0.5"/>)}
      break;
    case 'lily':
      for(let i=0;i<6;i++){const a=(i/6)*360-90;els.push(<path key={i} d={ppet(s*0.2*sc,s*0.85*sc)} fill={i<3?main:light} stroke={OL} strokeWidth="1.1" transform={`rotate(${a} ${cx} ${fy})`}/>)}
      for(let i=0;i<6;i++){const a=(i/6)*360-90;els.push(<line key={`st-${i}`} x1={cx} y1={fy-s*0.1*sc} x2={cx+Math.cos(a*Math.PI/180)*s*0.4*sc} y2={fy-s*0.5*sc+Math.sin(a*Math.PI/180)*s*0.4*sc} stroke={OL} strokeWidth="0.7"/>);els.push(<circle key={`sd-${i}`} cx={cx+Math.cos(a*Math.PI/180)*s*0.45*sc} cy={fy-s*0.5*sc+Math.sin(a*Math.PI/180)*s*0.45*sc} r="1.5" fill="#f5e8a0" stroke={OL} strokeWidth="0.5"/>)}
      break;
    case 'lotus':
      for(let i=0;i<8;i++){const a=(i/8)*360-90;els.push(<path key={`o-${i}`} d={ppet(s*0.28*sc,s*0.7*sc)} fill={light} stroke={OL} strokeWidth="1" transform={`rotate(${a} ${cx} ${fy})`}/>)}
      for(let i=0;i<5;i++){const a=(i/5)*360-90;els.push(<path key={`i-${i}`} d={ppet(s*0.16*sc,s*0.45*sc)} fill={main} stroke={OL} strokeWidth="0.9" transform={`rotate(${a} ${cx} ${fy})`}/>)}
      els.push(<circle key="cc" cx={cx} cy={fy-s*0.1*sc} r={s*0.15*sc} fill="#f5e8a0" stroke={OL} strokeWidth="0.8"/>);
      break;
    case 'orchid':
      els.push(<path key="t" d={`M${cx},${fy} C${cx-12},${fy-s*0.5} ${cx-10},${fy-s*1.0} ${cx},${fy-s*1.1} C${cx+10},${fy-s*1.0} ${cx+12},${fy-s*0.5} ${cx},${fy}`} fill={main} stroke={OL} strokeWidth="1.1"/>);
      els.push(<path key="sl" d={`M${cx},${fy} C${cx-18},${fy-s*0.3} ${cx-30},${fy-s*0.4} ${cx-28},${fy-s*0.7} C${cx-20},${fy-s*0.8} ${cx-8},${fy-s*0.4} ${cx},${fy}`} fill={light} stroke={OL} strokeWidth="1"/>);
      els.push(<path key="sr" d={`M${cx},${fy} C${cx+18},${fy-s*0.3} ${cx+30},${fy-s*0.4} ${cx+28},${fy-s*0.7} C${cx+20},${fy-s*0.8} ${cx+8},${fy-s*0.4} ${cx},${fy}`} fill={light} stroke={OL} strokeWidth="1"/>);
      els.push(<path key="lip" d={`M${cx},${fy+4} C${cx-14},${fy-s*0.1} ${cx-15},${fy+s*0.35} ${cx},${fy+s*0.45} C${cx+15},${fy+s*0.35} ${cx+14},${fy-s*0.1} ${cx},${fy+4}`} fill={ac} stroke={OL} strokeWidth="1.1"/>);
      els.push(<circle key="lipc" cx={cx} cy={fy+s*0.15*sc} r={s*0.08*sc} fill="#f5e8a0" stroke={OL} strokeWidth="0.6"/>);
      break;
    case 'poppy':
      for(let i=0;i<4;i++){const a=i*90+15;els.push(<path key={i} d={rpet(s*0.55*sc,s*0.8*sc)} fill={i%2?main:light} stroke={OL} strokeWidth="1.2" transform={`rotate(${a} ${cx} ${fy})`}/>)}
      els.push(<circle key="c" cx={cx} cy={fy-s*0.05*sc} r={s*0.24*sc} fill="#3a3028" stroke={OL} strokeWidth="1"/>);
      for(let i=0;i<14;i++){const a=(i/14)*360,r2=s*0.16*sc;els.push(<circle key={`sd-${i}`} cx={cx+Math.cos(a*Math.PI/180)*r2} cy={fy-s*0.05*sc+Math.sin(a*Math.PI/180)*r2} r="1.3" fill="#f5e8a0" stroke={OL} strokeWidth="0.5"/>)}
      break;
    case 'peony':{
      // round fluffy bloom — petals arranged in concentric rings
      const fc=fy-s*0.25*sc; // flower visual center
      for(let l=0;l<4;l++){
        const n=[6,7,8,7][l],rad=s*[0.38,0.30,0.22,0.15][l]*sc;
        const fill=l%2===0?main:light;
        for(let i=0;i<n;i++){
          const a=(i/n)*360+(l%2?10:0);
          const px=cx+Math.cos(a*Math.PI/180)*rad*0.25;
          const py=fc+Math.sin(a*Math.PI/180)*rad*0.25;
          els.push(<ellipse key={`${l}-${i}`} cx={px} cy={py} rx={rad*0.6} ry={rad*0.9} fill={fill} stroke={OL} strokeWidth="0.8" transform={`rotate(${a+90} ${px} ${py})`}/>);
        }
      }
      els.push(<circle key="cc" cx={cx} cy={fc} r={s*0.1*sc} fill="#f5e8a0" stroke={OL} strokeWidth="0.7"/>);
      break;}
  }
  return <g className={sc>0.9?'anim-bloom':''}>{els}</g>;
}

function PlantSVG({growth,hue,plantTypeId,size=260,burstKey=0}){
  const pt=PLANTS.find(p=>p.id===plantTypeId)||PLANTS[0];
  const g=Math.min(growth,1.05),cx=140,soil=256;
  const main=hueHSL(hue),light=hueSoft(hue);
  const stemH=easeOut(g)*100+Math.min(Math.max(0,g-0.6),0.9)*30,stemTop=soil-stemH;
  const leafP=Math.max(0,(g-0.08)/0.92);
  const bloomP=Math.max(0,(g-0.25)/0.75);
  const bloomO=Math.max(0,(g-0.45)/0.55);
  const LF='#a8c898',LS='#6a8a5a';
  const flowerS=20+Math.min(g,1.8)*80;

  function Leaves(){
    if(leafP<=0)return null;
    const n=Math.floor(leafP*3)+1;
    const items=[];
    for(let i=0;i<n;i++){
      const t=0.12+(i/Math.max(n-1,1))*0.48,ly=soil-t*stemH;
      const side=i%2===0?-1:1,ls=8+leafP*15;
      const ang=side*(22+leafP*8);
      const lx=cx+side*(3+t*5);
      items.push(
        <g key={i} transform={`translate(${lx},${ly}) rotate(${ang})`}>
          <path d={`M0,0 C${ls*0.35},${-ls*0.2} ${ls*0.6},${-ls*0.85} 0,${-ls*1.4} C${-ls*0.6},${-ls*0.85} ${-ls*0.35},${-ls*0.2} 0,0 Z`} fill={i%2?LF:'#b8d8a8'} stroke={OL} strokeWidth="0.8"/>
          <line x1="0" y1="-1" x2="0" y2={-ls*1.2} stroke={LS} strokeWidth="0.5" opacity="0.6"/>
        </g>
      );
    }
    return items;
  }

  function Bud(){
    if(bloomP<=0.05||bloomO>0.7)return null;
    const fy=stemTop,bs=10+bloomP*10;
    return (
      <g opacity={1-bloomO}>
        <path d={`M${cx},${fy} Q${cx-bs*0.7},${fy-bs*1.5} ${cx},${fy-bs*2.8} Q${cx+bs*0.7},${fy-bs*1.5} ${cx},${fy} Z`} fill={light} stroke={OL} strokeWidth="1"/>
        <path d={`M${cx-bs*0.4},${fy-bs*1.3} Q${cx},${fy-bs*2.2} ${cx+bs*0.4},${fy-bs*1.3}`} fill="none" stroke={OL} strokeWidth="0.6" opacity="0.5"/>
      </g>
    );
  }

  return (
    <svg viewBox="0 0 280 350" width={size} height={size*350/280} className="plant-trans">
      <defs>
        <filter id="glow"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      {/* pot body */}
      <path d={`M92,252 C92,305 96,319 102,320 L178,320 C184,319 188,305 188,252 Z`} fill={light} stroke={OL} strokeWidth="1.2"/>
      {/* pot stripes */}
      <line x1="115" y1="255" x2="113" y2="313" stroke={OL} strokeWidth="0.6" opacity="0.2"/>
      <line x1="132" y1="254" x2="130" y2="315" stroke={OL} strokeWidth="0.6" opacity="0.25"/>
      <line x1="148" y1="254" x2="150" y2="315" stroke={OL} strokeWidth="0.6" opacity="0.25"/>
      <line x1="165" y1="255" x2="167" y2="313" stroke={OL} strokeWidth="0.6" opacity="0.2"/>
      {/* soil inside pot */}
      <ellipse cx="140" cy="254" rx="44" ry="9" fill="#c8b8a0" stroke={OL} strokeWidth="0.8"/>
      {/* pot rim — drawn after soil so it overlaps */}
      <rect x="85" y="242" width="110" height="15" rx="6" fill="white" stroke={OL} strokeWidth="1.2"/>
      <rect x="88" y="244" width="104" height="9" rx="4" fill={light} opacity="0.5"/>
      <path d={`M86,244 Q140,238 194,244`} fill="none" stroke={OL} strokeWidth="0.8" opacity="0.4"/>
      {/* stem — starts from soil surface, goes up to stemTop */}
      {g>0.03&&<path d={`M${cx},${soil} Q${cx-5},${soil-stemH*0.45} ${cx+2},${stemTop}`} fill="none" stroke={pt.stem} strokeWidth="3" strokeLinecap="round"/>}
      <Leaves/>
      <Bud/>
      {bloomO>0.2&&<g style={{transformOrigin:`${cx}px ${stemTop}px`,animation:burstKey>0?'flower-bounce 0.55s ease-out':''}}><BloomFlower tid={pt.id} cx={cx} fy={stemTop} s={flowerS} sc={bloomO} main={main} light={light} hue={hue}/></g>}
      {/* burst sparkles — triggered on drink */}
      {burstKey>0&&bloomO>0.2&&[...Array(8)].map((_,i)=>{
        const seed=burstKey*17+i*31,a=(i/8)*360+(seed%25),r=flowerS*0.5+(seed%Math.floor(flowerS*0.5));
        const sx=Math.cos(a*Math.PI/180)*r,sy=Math.sin(a*Math.PI/180)*r;
        return <g key={`bst-${burstKey}-${i}`}><circle cx={cx} cy={stemTop} r="4" fill="#fce898" opacity="0.9" filter="url(#glow)" style={{'--sx':`${sx}px`,'--sy':`${sy}px`,animation:`sparkle-burst 0.75s ease-out forwards`}}/><circle cx={cx} cy={stemTop} r="1.5" fill="#fff" style={{'--sx':`${sx*1.15}px`,'--sy':`${sy*1.15}px`,animation:`sparkle-burst 0.75s ease-out forwards`}}/></g>;
      })}
      {/* static sparkles when fully bloomed */}
      {g>0.9&&[[cx-flowerS*0.4,stemTop-flowerS*0.1],[cx+flowerS*0.35,stemTop-flowerS*0.5],[cx-flowerS*0.2,stemTop-flowerS*0.7],[cx+flowerS*0.4,stemTop-flowerS*0.05]].map(([sx,sy],i)=>(
        <g key={`sp-${i}`} className="anim-shimmer" style={{animationDelay:`${i*0.35}s`}}>
          <line x1={sx-2} y1={sy} x2={sx+2} y2={sy} stroke={OL} strokeWidth="0.6" opacity="0.5"/>
          <line x1={sx} y1={sy-2} x2={sx} y2={sy+2} stroke={OL} strokeWidth="0.6" opacity="0.5"/>
        </g>
      ))}
    </svg>
  );
}

function MiniPlant({growth,hue,plantTypeId}){
  const pt=PLANTS.find(p=>p.id===plantTypeId)||PLANTS[0];
  const g=Math.min(growth,1.05);
  const col=hueHSL(hue),light=hueSoft(hue),ac=hueAccent(hue);
  if(g<0.03) return (<svg viewBox="0 0 24 24" width="24" height="24"><circle cx="12" cy="15" r="1.5" fill="none" stroke={OL} strokeWidth="0.8" opacity="0.35"/></svg>);
  const sz=24, cx=12, cy=12, bloom=g>0.5, bud=g>0.25&&!bloom, leaves=g>0.15;
  const fr=g>1?5.5:(g>0.85?4.5:3.5);
  const lt=g>0.9?light:col;
  const els=[];
  if(leaves){els.push(<path key="l1" d={`M${cx},${cy} Q${cx-7},${cy-3} ${cx-9},${cy-8} Q${cx-3},${cy-6} ${cx},${cy}`} fill="#a8c898" stroke={OL} strokeWidth="0.7"/>);els.push(<line key="lv1" x1={cx-1} y1={cy-1} x2={cx-7} y2={cy-7} stroke="#6a8a5a" strokeWidth="0.4"/>)}
  if(leaves){els.push(<path key="l2" d={`M${cx},${cy} Q${cx+7},${cy-4} ${cx+9},${cy-9} Q${cx+3},${cy-7} ${cx},${cy}`} fill="#b8d8a8" stroke={OL} strokeWidth="0.7"/>);els.push(<line key="lv2" x1={cx+1} y1={cy-1} x2={cx+7} y2={cy-8} stroke="#6a8a5a" strokeWidth="0.4"/>)}
  if(bud){els.push(<path key="bd" d={`M${cx},${cy-6} Q${cx-4},${cy-12} ${cx},${cy-16} Q${cx+4},${cy-12} ${cx},${cy-6} Z`} fill={lt} stroke={OL} strokeWidth="0.8"/>)}
  if(bloom){
    const n=pt.id==='peony'||pt.id==='rose'?6:pt.id==='daisy'?12:pt.id==='tulip'?3:5;
    for(let i=0;i<n;i++){
      const a=(i/n)*360, rad=fr*0.9, w=pt.id==='daisy'?fr*0.3:fr*0.55, h=pt.id==='daisy'?fr*1.1:fr*0.9;
      els.push(<ellipse key={`p-${i}`} cx={cx+Math.cos(a*Math.PI/180)*w*0.3} cy={cy-fr*0.5+Math.sin(a*Math.PI/180)*w*0.3} rx={w} ry={h} fill={i%2?col:light} stroke={OL} strokeWidth="0.7" transform={`rotate(${a} ${cx} ${cy-fr*0.5})`}/>);
    }
    els.push(<circle key="ctr" cx={cx} cy={cy-fr*0.5} r={fr*0.3} fill="#f5e8a0" stroke={OL} strokeWidth="0.6"/>);
    if(pt.id==='poppy'){els.push(<circle key="dkc" cx={cx} cy={cy-fr*0.5} r={fr*0.35} fill={OL} opacity="0.7"/>)}
  }
  return (<svg viewBox={`0 0 ${sz} ${sz}`} width={sz} height={sz}>{els}</svg>);
}

function App(){
  const [data,setData]=useState(()=>{try{return JSON.parse(localStorage.getItem('wp_v3final'))||{}}catch(e){return{}}});
  const [settings,setSettings]=useState(()=>{try{return JSON.parse(localStorage.getItem('wp_v3final_s'))||{cupSize:250,dailyGoal:2000}}catch(e){return{cupSize:250,dailyGoal:2000}}});
  const [note,setNote]=useState('');
  const [calMonth,setCalMonth]=useState(new Date().getMonth());
  const [calYear,setCalYear]=useState(new Date().getFullYear());
  const [toast,setToast]=useState(null);
  const [showSettings,setShowSettings]=useState(false);
  const [burstKey,setBurstKey]=useState(0);
  const [dayNames,setDayNames]=useState(()=>{try{return JSON.parse(localStorage.getItem('wp_v3final_names'))||{}}catch(e){return{}}});
  const [selectedDayKey,setSelectedDayKey]=useState(null);
  const [showFullCalendar,setShowFullCalendar]=useState(false);

  const today=todayKey();
  const entry=data[today]||{drinks:[],totalMl:0,plantType:pickPlant(today)};
  const growth=Math.min(entry.totalMl/(settings.dailyGoal||2000),1.05);
  const hue=entry.drinks?.length>0?entry.drinks[entry.drinks.length-1].hue:90;
  const pt=PLANTS.find(p=>p.id===entry.plantType)||PLANTS[0];
  const pct=Math.min(Math.round((entry.totalMl/(settings.dailyGoal||2000))*100),999);

  useEffect(()=>{if(!data[today]||!data[today].plantType){setData(p=>{const n={...p};if(!n[today])n[today]={drinks:[],totalMl:0};n[today].plantType=pickPlant(today);return n})}},[today]);
  useEffect(()=>{localStorage.setItem('wp_v3final',JSON.stringify(data))},[data]);
  useEffect(()=>{localStorage.setItem('wp_v3final_s',JSON.stringify(settings))},[settings]);
  useEffect(()=>{localStorage.setItem('wp_v3final_names',JSON.stringify(dayNames))},[dayNames]);
  useEffect(()=>{const c=new Date();c.setDate(c.getDate()-90);const ck=`${c.getFullYear()}-${String(c.getMonth()+1).padStart(2,'0')}-${String(c.getDate()).padStart(2,'0')}`;setData(p=>{const n={...p};let ch=false;for(const k of Object.keys(n)){if(k<ck&&k!==today){delete n[k];ch=true}}return ch?n:p})},[today]);

  function toastMsg(m){setToast(m);setTimeout(()=>setToast(null),1800)}
  function addWater(ml){
    const t=note.trim()||'在生长';const h=textToHue(t);
    setData(p=>{const n={...p};if(!n[today])n[today]={drinks:[],totalMl:0,plantType:pickPlant(today)};else n[today]={...n[today]};n[today].drinks=[...n[today].drinks,{time:timeNow(),ml,text:t,hue:h}];n[today].totalMl+=ml;return n});
    setNote('');toastMsg(`+${ml}ml · 已记录`);setBurstKey(k=>k+1);
  }
  function undo(){setData(p=>{if(!p[today]||p[today].drinks.length===0)return p;const n={...p};n[today]={...n[today]};const r=n[today].drinks.pop();n[today].totalMl=Math.max(0,n[today].totalMl-r.ml);return n})}
  function delDrink(idx){setData(p=>{if(!p[today])return p;const n={...p};n[today]={...n[today]};const d=[...n[today].drinks];const r=d.splice(idx,1)[0];n[today].drinks=d;n[today].totalMl=Math.max(0,n[today].totalMl-r.ml);return n})}

  const stageLab=growth<0.03?'破土':growth<0.35?'抽枝':growth<0.7?'含苞':growth<1?'绽放':'满开';

  return (
    <div className="min-h-screen bg-cream relative">
      <div className="ambient-glow" style={{background: entry.drinks?.length>0?hueHSL(hue):'#d2e3f0'}}/>
      {toast&&<div className="fixed top-6 left-1/2 -translate-x-1/2 z-50 px-5 py-2.5 bg-ink/90 text-white text-sm rounded-full font-light tracking-wider">{toast}</div>}
      <div className="max-w-lg mx-auto px-5 py-8 pb-16">
        <header className="text-center mb-8 pt-2">
          <h1 className="text-xl font-medium tracking-[0.3em] text-ink/90 mb-1">喝 水 养 花</h1>
          {(() => {
            if (growth < 0.03) return <p className="text-xs text-soft tracking-widest">🌱 今天会种出什么呢？</p>;
            if (growth < 0.35) return <p className="text-xs text-soft tracking-widest">🌿 小芽破土，还在积蓄力量…</p>;
            if (growth < 0.7) return <p className="text-xs text-soft tracking-widest">🪴 枝叶舒展，含苞待放…</p>;
            return <p className="text-xs text-soft tracking-widest">{pt.emoji} 今天种出了<span className="text-ink/70 font-medium ml-1">{pt.name}</span></p>;
          })()}
        </header>

        <div className="glass rounded-2xl p-6 mb-4 flex items-center justify-center min-h-[320px] relative overflow-hidden">
          <div className="anim-float"><PlantSVG growth={growth} hue={hue} plantTypeId={entry.plantType} size={240} burstKey={burstKey}/></div>
          <div className="absolute top-3 right-4 z-10"><span className="px-2.5 py-1 rounded-full bg-white/70 border border-warm-200/40 text-[10px] text-ink/55 tracking-wider">{pt.emoji} {stageLab}</span></div>
        </div>

        <div className="grid grid-cols-5 gap-3 mb-4">
          <div className="col-span-3 glass rounded-2xl p-4 flex flex-col gap-2.5">
            <p className="text-[10px] text-soft tracking-widest uppercase mb-0.5">快捷饮水</p>
            <div className="flex gap-2">
              <button onClick={()=>addWater(settings.cupSize)} className="flex-1 py-3 rounded-xl bg-warm-100 hover:bg-warm-200 text-sm font-medium text-ink/80 tracking-wider transition-all active:scale-95">+{settings.cupSize}ml</button>
            </div>
            <button onClick={undo} className="text-[11px] text-soft hover:text-ink/60 tracking-wider transition-colors self-start">↩ 撤销上一杯</button>
          </div>
          <div className="col-span-2 glass rounded-2xl p-4 flex flex-col justify-between">
            <p className="text-[10px] text-soft tracking-widest uppercase">今日饮水</p>
            <div>
              <p className="text-2xl font-light tracking-tight"><span className="font-medium">{entry.totalMl}</span><span className="text-sm text-soft ml-1">ml</span></p>
              <div className="w-full h-1 bg-warm-100 rounded-full mt-2 overflow-hidden">
                <div className="h-full rounded-full transition-all duration-700 ease-out" style={{width:`${Math.min(pct,100)}%`,background:`linear-gradient(90deg,${hueSoft(hue)},${hueHSL(hue)})`}}/>
              </div>
              <p className="text-[10px] text-soft mt-1 text-right">{pct}%</p>
            </div>
          </div>
        </div>

        <div className="glass rounded-2xl p-4 mb-4">
          <div className="flex gap-2 items-center">
            <input type="text" value={note} onChange={e=>setNote(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&note.trim())addWater(settings.cupSize)}} placeholder="此刻的心情、歌名、在做的事…" className="flex-1 bg-transparent border-none outline-none text-sm text-ink/80 placeholder:text-soft/60 py-2 font-light tracking-wider"/>
            <button onClick={()=>addWater(settings.cupSize)} className="shrink-0 w-10 h-10 rounded-xl bg-warm-100 hover:bg-warm-200 flex items-center justify-center transition-all active:scale-95">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="text-ink/60"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <button onClick={()=>setShowSettings(true)} className="shrink-0 w-10 h-10 rounded-xl hover:bg-warm-50 flex items-center justify-center transition-all">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="text-soft"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
          </div>
        </div>

        <div className="glass rounded-2xl p-5 mb-4">
          <p className="text-[10px] text-soft tracking-widest uppercase mb-4">今 日 时 刻</p>
          {(entry.drinks||[]).length===0?<p className="text-xs text-soft/60 text-center py-4 font-light">喝第一杯水，种下今天的种子</p>:(
            <div className="flex flex-col gap-0">
              {[...entry.drinks].reverse().map((d,i)=>{const ri=entry.drinks.length-1-i;return(
                <div key={i} className="flex items-center gap-3 py-2.5 border-b border-warm-50 last:border-0 group">
                  <span className="text-[11px] text-soft/70 tabular-nums w-10 shrink-0">{d.time}</span>
                  <span className="w-2 h-2 rounded-full shrink-0" style={{background:hueHSL(d.hue)}}/>
                  <span className="text-sm text-ink/75 flex-1 font-light truncate">{d.text}</span>
                  <span className="text-[10px] text-soft/50 tabular-nums mr-1">{d.ml}ml</span>
                  <button onClick={()=>delDrink(ri)} className="opacity-0 group-hover:opacity-40 hover:!opacity-100 text-soft text-xs transition-all">×</button>
                </div>
              )})}
            </div>
          )}
        </div>

        <div className="glass rounded-2xl p-5 relative overflow-hidden">
          {showFullCalendar ? (<>
            <div className="flex items-center justify-between mb-4">
              <button onClick={()=>setShowFullCalendar(false)} className="text-[11px] text-ink/50 tracking-wider hover:text-ink/70 transition-colors">← 返回</button>
              <span className="text-[11px] text-ink/55 font-medium tracking-wider">{calYear}.{String(calMonth+1).padStart(2,'0')}</span>
              <div className="flex items-center gap-1.5">
                <button onClick={()=>{if(calMonth===0){setCalMonth(11);setCalYear(y=>y-1)}else setCalMonth(m=>m-1)}} className="w-5 h-5 rounded-full bg-warm-100/60 hover:bg-warm-200/70 flex items-center justify-center text-xs text-ink/40 transition-all">‹</button>
                <button onClick={()=>{if(calMonth===11){setCalMonth(0);setCalYear(y=>y+1)}else setCalMonth(m=>m+1)}} className="w-5 h-5 rounded-full bg-warm-100/60 hover:bg-warm-200/70 flex items-center justify-center text-xs text-ink/40 transition-all">›</button>
              </div>
            </div>
            <div className="grid grid-cols-7 gap-0.5 mb-1">
              {['日','一','二','三','四','五','六'].map(d=><div key={d} className="text-center text-[10px] text-soft/35 py-1 font-light">{d}</div>)}
            </div>
            <div className="grid grid-cols-7 gap-1">
              {(()=>{
                const dim=daysInMonth(calYear,calMonth),fd=new Date(calYear,calMonth,1).getDay(),cells=[];
                for(let i=0;i<fd;i++)cells.push(<div key={`e-${i}`} className="aspect-square"/>);
                for(let d=1;d<=dim;d++){
                  const dk=dateKey(calYear,calMonth,d),e=data[dk],isT=dk===today;
                  const g=e?Math.min(e.totalMl/(settings.dailyGoal||2000),1):0;
                  const h=e?.drinks?.length>0?e.drinks[e.drinks.length-1].hue:90;
                  const pid=e?.plantType||pickPlant(dk);
                  cells.push(
                    <div key={d} onClick={()=>{if(e)setSelectedDayKey(dk)}}
                      className={`aspect-square rounded-md flex flex-col items-center justify-center ${e?'cursor-pointer hover:bg-warm-50/60':''} ${isT?'ring-1 ring-ink/20 bg-white/50':''} transition-all`}>
                      {e ? <MiniPlant growth={g} hue={h} plantTypeId={pid}/> : <span className="text-[10px] text-soft/12">·</span>}
                      <span className={`text-[8px] mt-0.5 tabular-nums ${isT?'text-ink/70 font-semibold':e?'text-ink/40':'text-soft/20'}`}>{d}</span>
                    </div>
                  );
                }
                return cells;
              })()}
            </div>
          </>) : (<>
            <div className="flex items-center justify-between mb-4">
              <div className="flex items-center gap-2">
                <span className="text-sm opacity-60">🫙</span>
                <p className="text-[11px] text-ink/65 tracking-[0.15em] font-medium">时 空 温 室</p>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-2.5">
              {(()=>{
                const today7=[],now=new Date();
                for(let i=0;i<7;i++){const d=new Date(now);d.setDate(d.getDate()-i);today7.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`)}
                return today7.map(dk=>{
                  const e=data[dk],isT=dk===today;
                  const g=e?Math.min(e.totalMl/(settings.dailyGoal||2000),1):0;
                  const h=e?.drinks?.length>0?e.drinks[e.drinks.length-1].hue:90;
                  const pid=e?.plantType||pickPlant(dk);
                  const ptObj=PLANTS.find(p=>p.id===pid)||PLANTS[0];
                  const gardenName=dayNames[dk]||(e?ptObj.name:'待开垦');
                  const summary=e?`${e.totalMl}ml · ${e.drinks.length}株`:'尚无记录';
                  const [y,m,d]=dk.split('-').map(Number);
                  const wk=['周日','周一','周二','周三','周四','周五','周六'][new Date(y,m-1,d).getDay()];
                  return (
                    <div key={dk} onClick={()=>{if(e)setSelectedDayKey(dk)}}
                      className={`rounded-xl py-2.5 px-1 flex flex-col items-center gap-1 border transition-all duration-300 ${
                        e ? `cursor-pointer hover:scale-[1.03] hover:shadow-md ${isT?'border-ink/20 bg-white/60':'border-warm-200/40 bg-warm-50/50'}` :
                        'border-transparent bg-transparent opacity-40'
                      }`}>
                      <div className="flex items-center justify-center">
                        {e ? <PlantSVG growth={g} hue={h} plantTypeId={pid} size={150} burstKey={0}/> : <span className="text-2xl opacity-15 py-8">🌰</span>}
                      </div>
                      <span className={`text-[10px] font-medium tracking-wide truncate w-full text-center leading-tight ${e?'text-ink/65':'text-soft/35'}`}>{gardenName}</span>
                      <span className="text-[8px] text-soft/40 tabular-nums leading-tight">{m}/{d} {wk}</span>
                      <span className={`text-[8px] tracking-wider leading-tight ${e?'text-ink/35':'text-soft/25'}`}>{summary}</span>
                    </div>
                  );
                });
              })()}
            </div>
            <button onClick={()=>setShowFullCalendar(true)} className="w-full mt-3 py-2.5 rounded-xl bg-warm-50/70 hover:bg-warm-100/70 text-[11px] text-ink/45 tracking-wider transition-colors">查看完整月历 →</button>
          </>)}
        </div>
      </div>

      {showSettings&&(
        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/10 backdrop-blur-sm" onClick={e=>{if(e.target===e.currentTarget)setShowSettings(false)}}>
          <div className="bg-white rounded-2xl p-6 w-full max-w-xs shadow-xl border border-warm-100">
            <h3 className="text-sm font-medium tracking-widest text-ink/80 mb-5">设 置</h3>
            <label className="block text-[11px] text-soft tracking-wider mb-1.5">每杯水量 (ml)</label>
            <input type="text" inputMode="numeric" value={settings.cupSize} onChange={e=>setSettings(s=>({...s,cupSize:e.target.value}))} onBlur={e=>{const v=parseInt(e.target.value);if(!v||v<50)setSettings(s=>({...s,cupSize:250}));else if(v>1000)setSettings(s=>({...s,cupSize:1000}));else setSettings(s=>({...s,cupSize:v}))}} onKeyDown={e=>{if(e.key==='ArrowUp'){e.preventDefault();setSettings(s=>({...s,cupSize:Math.min(1000,(parseInt(s.cupSize)||250)+50)}))}if(e.key==='ArrowDown'){e.preventDefault();setSettings(s=>({...s,cupSize:Math.max(50,(parseInt(s.cupSize)||250)-50)}))}}} className="w-full bg-warm-50 rounded-lg px-3 py-2.5 text-sm outline-none mb-4 font-light"/>
            <label className="block text-[11px] text-soft tracking-wider mb-1.5">每日目标 (ml)</label>
            <input type="text" inputMode="numeric" value={settings.dailyGoal} onChange={e=>setSettings(s=>({...s,dailyGoal:e.target.value}))} onBlur={e=>{const v=parseInt(e.target.value);if(!v||v<500)setSettings(s=>({...s,dailyGoal:2000}));else if(v>5000)setSettings(s=>({...s,dailyGoal:5000}));else setSettings(s=>({...s,dailyGoal:v}))}} onKeyDown={e=>{if(e.key==='ArrowUp'){e.preventDefault();setSettings(s=>({...s,dailyGoal:Math.min(5000,(parseInt(s.dailyGoal)||2000)+50)}))}if(e.key==='ArrowDown'){e.preventDefault();setSettings(s=>({...s,dailyGoal:Math.max(500,(parseInt(s.dailyGoal)||2000)-50)}))}}} className="w-full bg-warm-50 rounded-lg px-3 py-2.5 text-sm outline-none mb-6 font-light"/>
            <button onClick={()=>setShowSettings(false)} className="w-full py-2.5 bg-ink text-white rounded-xl text-sm tracking-wider font-light">完 成</button>
          </div>
        </div>
      )}
      {selectedDayKey&&(()=>{
        const se=data[selectedDayKey]||{drinks:[],totalMl:0,plantType:pickPlant(selectedDayKey)};
        const sg=Math.min(se.totalMl/(settings.dailyGoal||2000),1.05);
        const sh=se.drinks?.length>0?se.drinks[se.drinks.length-1].hue:90;
        const sp=se.plantType||pickPlant(selectedDayKey);
        const spt=PLANTS.find(p=>p.id===sp)||PLANTS[0];
        const sn=dayNames[selectedDayKey]||spt.name;
        const [sy,sm,sd]=selectedDayKey.split('-').map(Number);
        const sdObj=new Date(sy,sm-1,sd);
        const swk=['周日','周一','周二','周三','周四','周五','周六'][sdObj.getDay()];
        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/15 backdrop-blur-sm" onClick={e=>{if(e.target===e.currentTarget)setSelectedDayKey(null)}}>
            <div className="bg-white rounded-2xl p-5 w-full max-w-sm max-h-[85vh] overflow-y-auto shadow-xl border border-warm-100 flex flex-col gap-4">
              <div className="text-center">
                <input type="text" value={sn} onChange={e=>{const v=e.target.value;if(v.trim())setDayNames(n=>({...n,[selectedDayKey]:v}));else setDayNames(n=>{const n2={...n};delete n2[selectedDayKey];return n2})}} className="text-base font-medium text-ink/85 tracking-wider text-center bg-transparent border-b border-warm-100 hover:border-warm-200 focus:border-ink/20 outline-none px-2 py-0.5 w-full"/>
                <p className="text-[10px] text-soft/60 tracking-widest mt-1">{sy}年{sm}月{sd}日 {swk}</p>
              </div>
              <div className="flex justify-center py-2"><PlantSVG growth={sg} hue={sh} plantTypeId={sp} size={180}/></div>
              <div>
                <p className="text-[10px] text-soft/50 tracking-widest mb-2 pl-1">浇 灌 记 录</p>
                {(se.drinks||[]).length===0?<p className="text-xs text-soft/40 text-center py-3 font-light">这天没有浇水记录</p>:(
                  <div className="flex flex-col gap-1.5 max-h-[200px] overflow-y-auto">
                    {se.drinks.map((dr,idx)=>(<div key={idx} className="flex items-center gap-2.5 py-1.5 px-2 rounded-lg bg-warm-50/50"><span className="text-[10px] text-soft/40 tabular-nums w-5 shrink-0">#{idx+1}</span><span className="w-1.5 h-1.5 rounded-full shrink-0" style={{background:hueHSL(dr.hue||90)}}/><span className="text-xs text-ink/65 flex-1 font-light truncate">{dr.text||'在生长'}</span><span className="text-[10px] text-soft/45 tabular-nums">{dr.time}</span><span className="text-[10px] text-soft/35 tabular-nums">{dr.ml}ml</span></div>))}
                  </div>
                )}
              </div>
              <button onClick={()=>setSelectedDayKey(null)} className="w-full py-2.5 bg-ink text-white rounded-xl text-sm tracking-wider font-light">关 闭</button>
            </div>
          </div>
        );
      })()}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
